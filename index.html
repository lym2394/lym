<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LYM2394的导航</title>
    
    <!-- 引入字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- 引入样式 -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- 引入依赖库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
    <div class="app">
        <!-- 左侧文档列表 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16v16H4z"/>
                        <path d="M8 8h8M8 12h8M8 16h5"/>
                    </svg>
                    导航列表
                </h2>
                <p id="sidebarHint">/md/ 目录下的站内文档</p>
            </div>

            <!-- 分类切换标签 -->
            <div class="category-tabs">
                <button class="cat-tab active" data-cat="md">📄 站内文档</button>
                <button class="cat-tab" data-cat="html">🌐 站内网站</button>
            </div>

            <!-- 文档列表容器 -->
            <div class="doc-list" id="docList">
                <div class="empty-state">
                    <p>正在检测文件...</p>
                </div>
            </div>
        </div>

        <!-- 右侧内容区 -->
        <div class="content">
            <div class="content-header" id="contentHeader">
                <div class="content-title">
                    <span id="currentDocTitle">选择导航文件</span>
                    <span class="content-badge" id="docBadge" style="display: none;"></span>
                </div>
            </div>
            <div class="content-body" id="contentBody">
                <div class="welcome-message">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16v16H4z"/>
                        <path d="M8 8h8M8 12h8M8 16h5"/>
                    </svg>
                    <h3>欢迎使用 LYM2394 的导航</h3>
                    <p>请从左侧选择一个文件开始阅读</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 引入自定义模块 -->
    <script src="md-loader.js"></script>
    <script src="html-loader.js"></script>
    <script src="content-display.js"></script>

    <!-- 主控制脚本 -->
    <script>
        (function() {
            "use strict";

            // 配置 marked
            if (typeof marked !== 'undefined') {
                marked.setOptions({
                    highlight: function(code, lang) {
                        if (typeof hljs !== 'undefined' && lang && hljs.getLanguage(lang)) {
                            try { return hljs.highlight(code, { language: lang }).value; } catch (e) {}
                        }
                        return code;
                    },
                    breaks: true,
                    gfm: true
                });
            }

            const docListEl = document.getElementById('docList');
            const sidebarHint = document.getElementById('sidebarHint');
            
            let currentCategory = 'md';
            let activeFile = null;
            const docItems = new Map(); // 存储DOM元素
            const listLoaded = { md: false, html: false };
            const cachedLists = { md: null, html: null }; // 缓存列表结果

            // 分类切换
            const catTabs = document.querySelectorAll('.cat-tab');
            catTabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const cat = tab.dataset.cat;
                    if (cat === currentCategory) return;
                    
                    catTabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentCategory = cat;
                    
                    sidebarHint.textContent = cat === 'md' ? '/md/ 目录下的站内文档' : '/html/ 目录下的网站页面';
                    
                    // 加载或显示缓存的列表
                    loadOrShowList(cat);
                    
                    ContentDisplay.showWelcome(cat);
                    activeFile = null;
                });
            });

            // 加载或显示缓存的列表
            async function loadOrShowList(category) {
                if (listLoaded[category] && cachedLists[category]) {
                    // 显示缓存的列表
                    renderList(cachedLists[category], category);
                } else {
                    // 加载新列表
                    docListEl.innerHTML = '<div class="empty-state"><p>正在检测文件...</p></div>';
                    
                    let results;
                    if (category === 'md') {
                        results = await MDLoader.loadMDDocList();
                    } else {
                        results = await HTMLLoader.loadHTMLDocList();
                    }
                    
                    cachedLists[category] = results;
                    listLoaded[category] = true;
                    renderList(results, category);
                }
            }

            // 渲染列表
            function renderList(results, category) {
                docListEl.innerHTML = '';
                docItems.clear();
                
                let hasDocs = false;
                
                results.forEach((docInfo, idx) => {
                    const index = idx + 1;
                    if (docInfo && docInfo.exists) {
                        hasDocs = true;
                        const docItem = ContentDisplay.createDocItem(index, docInfo, category, (idx, cat) => {
                            loadDocument(idx, cat);
                        });
                        docListEl.appendChild(docItem);
                        const key = category + '-' + MDLoader.padIndex(index);
                        docItems.set(key, docItem);
                    }
                });
                
                if (!hasDocs) {
                    docListEl.innerHTML = `
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M4 4h16v16H4z"/>
                                <path d="M8 8h8M8 12h8M8 16h5"/>
                            </svg>
                            <p>未检测到文件</p>
                            <p style="margin-top: 8px; font-size: 0.85rem;">目录当前没有可用文件</p>
                        </div>
                    `;
                }
            }

            // 加载并显示文档
            async function loadDocument(index, category) {
                // 更新激活状态
                if (activeFile) {
                    const prevKey = activeFile.category + '-' + MDLoader.padIndex(activeFile.index);
                    const prevItem = docItems.get(prevKey);
                    if (prevItem) prevItem.classList.remove('active');
                }
                
                const currentKey = category + '-' + MDLoader.padIndex(index);
                const currentItem = docItems.get(currentKey);
                if (currentItem) currentItem.classList.add('active');
                
                activeFile = { index, category };
                
                ContentDisplay.showLoading();
                
                let docInfo;
                if (category === 'md') {
                    docInfo = await MDLoader.getMDContent(index);
                } else {
                    docInfo = await HTMLLoader.getHTMLContent(index);
                }
                
                if (docInfo && docInfo.exists) {
                    if (category === 'md') {
                        ContentDisplay.displayMDDoc(docInfo);
                    } else {
                        ContentDisplay.displayHTMLDoc(docInfo);
                    }
                    
                    // 更新列表项标题
                    if (currentItem) {
                        const titleEl = currentItem.querySelector('.doc-title');
                        const displayTitle = docInfo.title.length > 30 ? 
                            docInfo.title.slice(0, 28) + '…' : docInfo.title;
                        titleEl.textContent = displayTitle;
                    }
                } else {
                    const padded = category === 'md' ? MDLoader.padIndex(index) : HTMLLoader.padIndex(index);
                    const filename = `${padded}.${category}`;
                    ContentDisplay.showError(filename);
                }
            }

            // 初始化加载MD列表
            loadOrShowList('md');
        })();
    </script>
</body>
</html>
